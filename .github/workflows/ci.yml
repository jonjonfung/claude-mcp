name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check server imports and syntax
        run: python -c "import ast; ast.parse(open('server.py').read()); print('Syntax OK')"

      - name: Check all tool files
        run: |
          for f in tools/*.py; do
            python -c "import ast; ast.parse(open('$f').read()); print('$f OK')"
          done

  # Deploy step removed — MCP server runs locally and connects to AWS directly.
